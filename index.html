<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>辞書</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="header-text">
        <h1>辞書</h1>
        <p>CSVを読み込んで使う、ローカル辞書サイト</p>
      </div>
    </header>

    <div class="container">
      <!-- CSV読み込みエリア -->
      <div class="load-area" id="loadArea">
        <label for="csvFile"> CSVファイルを選択する </label>
        <input type="file" id="csvFile" accept=".csv" />
        <div class="load-status" id="loadStatus">
          CSVがまだ読み込まれていないよ
        </div>

        <div class="hint-box">
          <strong>CSVの形式</strong><br />
          1行目はヘッダー行として読み飛ばす。<br />
          2行目以降：<span
            >単語,読み,部首,説明,画像<br />
            例：木,き,木,木を表す漢字。,pic/ki.png</span
          ><br /><br />
          <strong>画像について</strong><br />
          5列目に画像のファイルパスを書くと、カードに画像が表示される。<br />
          画像は
          <span>index.html と同じフォルダ</span> を基準にしたパスで書く。<br />
          画像なしの場合は5列目を空欄にするか、省略してもOK！
        </div>
      </div>

      <!-- 部首フィルター -->
      <div class="filter-area" id="filterArea" style="display: none">
        <div class="filter-label">部首で絞り込む</div>
        <div class="radical-buttons" id="radicalButtons"></div>
      </div>

      <!-- 件数 -->
      <div class="result-count" id="resultCount" style="display: none"></div>

      <!-- カードグリッド -->
      <div class="cards-grid" id="cardsGrid"></div>

      <!-- 空の状態 -->
      <div class="empty-state" id="emptyState">
        <p>CSVファイルを選ぶと<br />ここに単語が表示されるよ</p>
      </div>
    </div>

    <footer>辞書</footer>
    <script src="script.js"></script>
  </body>
</html>
